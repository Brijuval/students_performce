<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>CGPA Analytics</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"/>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>Alliance School of Advanced Computing</h1>
            </div>
            <nav>
                <ul>
                    <li class="nav-item"><a href="index.html" class="active"><i class="fas fa-home"></i> Home</a></li>
                    <li class="nav-item"><a href="students.html"><i class="fas fa-users"></i> Students</a></li>
                    <li class="nav-item"><a href="subjects.html"><i class="fas fa-book"></i> Subjects</a></li>
                    <li class="nav-item"><a href="results.html"><i class="fas fa-chart-bar"></i> Results</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container analytics">
            <h2>Compute Individual CGPA</h2>
            <form id="cgpaForm">
                <label for="studentID">Enter Student ID:</label>
                <input type="text" id="studentID" required />
                <button type="submit">Get CGPA</button>
            </form>
            <p id="cgpaResult"></p>
        </div>

        <hr>

        <div class="container analytics">
            <h2>CGPA Overview</h2>
            <div id="cgpaStats"></div>
            <canvas id="cgpaChart" width="400" height="200"></canvas>
        </div>

        <div class="container analytics">
            <h2>Pass/Fail Students</h2>
            <table border="1" id="passFailTable">
                <thead>
                    <tr>
                        <th>Name</th>
                        <th>Roll No</th>
                        <th>CGPA</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="passFailTableBody"></tbody>
            </table>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Alliance School of Advanced Computing</p>
        </div>
    </footer>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const cgpaForm = document.getElementById("cgpaForm");
            const cgpaResult = document.getElementById("cgpaResult");

            cgpaForm.addEventListener("submit", async (e) => {
                e.preventDefault();

                const studentID = document.getElementById("studentID").value;
                console.log("Student ID entered:", studentID);

                try {
                    const res = await fetch(`http://localhost:5000/api/analytics/cgpa/${studentID}`);
                    console.log("Fetch status:", res.status);

                    const data = await res.json();
                    console.log("Response data:", data);

                    if (res.ok) {
                        if (data.message === "No results found") {
                            cgpaResult.textContent = `No results found for Student ID: ${studentID}.`;
                        } else {
                            cgpaResult.innerHTML = `
                                <strong>Student Name:</strong> ${data.name}<br>
                                <strong>Roll Number:</strong> ${data.rollNumber}<br>
                                <strong>Department:</strong> ${data.department}<br>
                                <strong>CGPA:</strong> ${data.cgpa}<br>
                                <strong>Status:</strong> ${data.status === "Pass" ? "✅ Pass" : "❌ Fail"}
                            `;
                        }
                    } else {
                        cgpaResult.textContent = `Error: ${data.error || "Unable to compute CGPA"}`;
                    }
                } catch (error) {
                    console.error("Error fetching CGPA:", error);
                    cgpaResult.textContent = "Server Error";
                }
            });
        });
    </script>
    <defer src="analytics.js"></defer>
</body>
</html>
