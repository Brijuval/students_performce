<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Manage Subjects</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <h1>Manage Subjects</h1>
    <nav>
      <ul>
        <li class="nav-item"><a href="index.html" class="active"><i class="fas fa-home"></i> Home</a></li>
          <li class="nav-item"><a href="students.html"><i class="fas fa-users"></i> Students</a></li>
          <li class="nav-item"><a href="results.html"><i class="fas fa-chart-bar"></i> Results</a></li>
          <li class="nav-item"><a href="analytics.html"><i class="fas fa-chart-line"></i> CGPA</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <h2>Subject Management</h2>
    <form id="subjectForm">
      <label for="subjectName">Subject Name:</label>
      <input type="text" id="subjectName" required />

      <label for="subjectCode">Subject Code:</label>
      <input type="text" id="subjectCode" required />

      <button type="submit">Add Subject</button>
    </form>

    <h3>Subject List</h3>
    <table id="subjectsTable">
      <thead>
        <tr>
          <th>Subject Name</th>
          <th>Subject Code</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="subjectsBody"></tbody>
    </table>
  </main>

  <footer>
    <p>&copy; 2025 Alliance School of Advanced Computing</p>
  </footer>
  <script src="config.js"></script>
  <script src="api-client.js"></script>
  <script src="ui-helpers.js"></script>
  <script defer src="subjects.js"></script>
</body>
</html>
