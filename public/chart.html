<!DOCTYPE html>
<html>
<head>
  <title>CGPA Chart</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    .student-button, #studentSelect {
      padding: 10px 20px;
      margin: 10px;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    #cgpaChart {
      border: 1px solid #ddd;
      margin: 20px auto;
      display: block;
    }

    #cgpaStats {
      color: red;
      font-weight: bold;
      text-align: center;
    }

    #loading {
      display: none;
      text-align: center;
      margin-top: 20px;
    }

  </style>
</head>
<body>

  <button class="student-button" data-student-id="60f89e27a9b8c1234567890a">Student A</button>
  <button class="student-button" data-student-id="61a1234567890abcdef1234">Student B</button>

  <canvas id="cgpaChart" width="400" height="200"></canvas>

  <div id="loading">Loading...</div>
  <div id="cgpaStats"></div>

  <script src="chart.js"></script>
</body>
</html>
