<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Students</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <h1>Manage Students</h1>
            </div>
            <nav>
                <ul>
                    <li class="nav-item"><a href="index.html"><i class="fas fa-home"></i> Home</a></li>
                    <li class="nav-item"><a href="subjects.html"><i class="fas fa-book"></i> Subjects</a></li>
                    <li class="nav-item"><a href="results.html"><i class="fas fa-chart-bar"></i> Results</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main>
        <div class="container">
            <h2>Student Management</h2>

            <form id="studentForm">
                <div class="form-group">
                    <label for="name">Student Name:</label>
                    <input type="text" id="name" name="name" placeholder="e.g., John Doe" required aria-label="Student Name">
                </div>
                <div class="form-group">
                    <label for="rollNumber">Student ID:</label>
                    <input type="text" id="rollNumber" name="rollNumber" placeholder="e.g., 12345" required aria-label="Student ID">
                </div>
                <div class="form-group">
                    <label for="department">Department:</label>
                    <input type="text" id="department" name="department" placeholder="e.g., Computer Science" required aria-label="Department">
                </div>

                <div class="form-group">
                    <label for="year">Year:</label>
                    <input type="number" id="year" name="year" placeholder="e.g., 2024" required aria-label="Year">
                </div> 

                <button type="submit" class="add-button"><i class="fas fa-plus-circle"></i> Add Student</button>
            </form>

            <div id="errorMessage" class="error-message" style="display: none; color: red;"></div>

            <h3>Student List</h3>
            <div id="loadingMessage">Loading students...</div>
            <div role="region" aria-label="Student Data Table">
                <table id="studentsTable">
                    <thead>
                        <tr>
                            <th>Student Name</th>
                            <th>Student ID</th>
                            <th>Department</th>
                            <th>CGPA</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="studentsBody">
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2025 Alliance School of Advanced Computing</p>
        </div>
    </footer>

    <script src="js/config.js"></script>
    <script src="js/api-client.js"></script>
    <script defer src="js/students.js"></script>
</body>
</html>
